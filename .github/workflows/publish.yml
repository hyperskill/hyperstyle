name: Publish to PyPI in case of releasing

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      force_publish:
        description: 'Force publish'
        type: boolean
        required: false
        default: false
  push:
    tags:
      - '*'
    paths-ignore:
      - .github/dependabot.yml
      - .github/pull_request_template.md
      - .github/workflows/build.yml
      - .github/workflows/build_base_image.yml
      - .github/workflows/build_image.yml
      - .github/workflows/sort_whitespaces.yml
      - .gitignore
      - README.md

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

run-name: >
  ${{ (github.event_name == 'workflow_dispatch' && 'Publish to PyPI') || ''}}
  ${{(github.event_name == 'workflow_dispatch' && inputs.force_publish && '[Force]') || ''}}

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: arc-runners-small

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build a binary wheel and a source tarball
        run: |
          python -m build --sdist --wheel --outdir dist/ .

      - name: Publish distribution to PyPI
        if: startsWith(github.ref, 'refs/tags') || inputs.force_publish
        uses: pypa/gh-action-pypi-publish@master
        with:
          password: ${{ secrets.SECRETS_TEST_PYPI_API_TOKEN }}
