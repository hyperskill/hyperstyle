name: Build Base Image

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      image_tag:
        type: string
        description: 'Image tag'
        required: true
        default: 'py3.10.14-java11.0.11-node14.17.3-go1.18.5'

concurrency:
  group: build-base-image-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

run-name: Build Base Image - ${{ inputs.image_tag }}

jobs:
  build_base_image:
    name: Build Base Image
    runs-on: arc-runners-small
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: hyperskill.azurecr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          pull: true
          push: true
          file: base.Dockerfile
          tags: hyperskill.azurecr.io/hyperstyle-base:${{ inputs.image_tag }}
          cache-from: |
            type=gha
            type=gha,scope=main
          cache-to: type=gha,mode=max
