name: Build Image after Release

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      image_tag:
        description: 'Image tag'
        required: true
        default: 'latest'
  release:
    types:
      - released

concurrency:
  group: build-image-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

run-name: >
  ${{ (github.event_name == 'workflow_dispatch' && format('Build Image - {0}', inputs.image_tag)) || '' }}
  ${{ (github.event_name == 'release' && format('Build Image - {0}', github.event.release.tag_name)) || '' }}

jobs:
  build_image:
    name: Build Image
    runs-on: arc-runners-small
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: hyperskill.azurecr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          tags: hyperskill.azurecr.io/hyperstyle:${{ inputs.image_tag || github.event.release.tag_name }}
          cache-from: |
            type=gha
            type=gha,scope=main
          cache-to: type=gha,mode=max
